services:
  - type: web
    name: minepredict-api
    runtime: python
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
