services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/saved_models:/app/backend/saved_models
      - ./reports:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
